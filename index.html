  // Standalone stand-in for the Claude-artifact window.storage API, backed by localStorage
  // so this build works outside claude.ai (e.g. hosted on GitHub Pages). Each browser/device
  // keeps its own separate save; there's no cross-device sync in this version.
  window.storage = {
    async get(key) {
      const v = localStorage.getItem("crimson_oath_standalone::" + key);
      if (v === null) throw new Error("not found");
      return { key, value: v, shared: false };
    },
    async set(key, value) {
      localStorage.setItem("crimson_oath_standalone::" + key, value);
      return { key, value, shared: false };
    },
    async delete(key) {
      localStorage.removeItem("crimson_oath_standalone::" + key);
      return { key, deleted: true, shared: false };
    },
    async list(prefix) {
      const keys = Object.keys(localStorage)
        .filter((k) => k.startsWith("crimson_oath_standalone::" + (prefix || "")))
        .map((k) => k.replace("crimson_oath_standalone::", ""));
      return { keys, prefix, shared: false };
    },
  };
